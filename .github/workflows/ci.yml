name: CI

on:
  push:
    branches: [main, smart, polish]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck & build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/steadily?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — lint, typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # TODO: make this blocking once the ~70 pre-existing react-hooks/purity
      # violations are fixed (tracked separately — not a CI-setup problem).
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
