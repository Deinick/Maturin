name: CI

on:
  push:
    branches: [main, smart, polish]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck & build
    runs-on: ubuntu-latest
    # prisma.config.ts eagerly reads DATABASE_URL at config-load time, even for
    # `prisma generate` which never opens a connection — a placeholder satisfies
    # that check without needing a real database in CI.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — lint, typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
